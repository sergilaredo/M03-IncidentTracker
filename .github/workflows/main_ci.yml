name: IncidentTracker CI (Policia Automàtic)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-security:
    runs-on: ubuntu-latest


    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Chrome
      run: |
        # Ubuntu runner ja té Chrome, només ens assegurem que webdriver-manager el trobi
        google-chrome --version

    - name: Run Security Tests
      env:
        DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
      run: |
        python manage.py makemigrations
        python manage.py migrate
        # Executem els tests amb verbositat alta
        python manage.py test incidents.tests_selenium -v 2
